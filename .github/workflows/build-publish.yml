name: Build and Publish gfatools

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build smoke-test image
        run: docker build -t picotainers-local/gfatools:smoke .

      - name: Smoke test
        run: |
          set -euo pipefail
          mkdir -p testdata
          cat > testdata/test.gfa <<'GFA'
          H	VN:Z:1.0
          S	s1	ACGTACGT
          GFA

          docker run --rm -v "$PWD/testdata:/data" picotainers-local/gfatools:smoke > testdata/help.txt
          grep -Ei '^Usage: gfatools' testdata/help.txt

          docker run --rm -v "$PWD/testdata:/data" picotainers-local/gfatools:smoke stat /data/test.gfa > testdata/stat.txt
          test -s testdata/stat.txt

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: picotainers/gfatools:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
