name: Build and Publish gfatools

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build smoke-test image
        run: docker build -t picotainers-local/gfatools:smoke .

      - name: Smoke test
        run: |
          set -euo pipefail
          docker run --rm picotainers-local/gfatools:smoke view > /tmp/gfatools_help.txt 2>&1 || true
          test -s /tmp/gfatools_help.txt
          grep -Ei 'gfatools|usage|view' /tmp/gfatools_help.txt

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: picotainers/gfatools:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
