name: Build and Publish gfatools

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build smoke-test image
        run: docker build -t picotainers-local/gfatools:smoke .

      - name: Smoke test
        run: |
          set -euo pipefail
          mkdir -p testdata
          printf 'H\tVN:Z:1.0\nS\ts1\tACGTACGT\n' > testdata/test.gfa

          docker run --rm -v "$PWD/testdata:/data" picotainers-local/gfatools:smoke --help > testdata/help.txt 2>&1 || true
          grep -Ei '^Usage: gfatools' testdata/help.txt

          docker run --rm -v "$PWD/testdata:/data" picotainers-local/gfatools:smoke stat /data/test.gfa > testdata/stat.txt
          test -s testdata/stat.txt

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: picotainers/gfatools:latest

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
